# 가계부 프로젝트 - 1단계: DB 컨테이너 하나만 띄워보기
# 폴더명이 한글이라 자동 프로젝트 이름이 비어버리므로 직접 지정한다.
name: ledger

# 'services' 아래에 띄울 상자(컨테이너)들을 나열한다. 지금은 db 하나뿐.
services:
  db:
    image: postgres:16          # 직접 굽지 않고 공식 PostgreSQL 16 이미지를 그대로 사용
    container_name: ledger_db   # 컨테이너 이름 (안 정하면 자동 생성됨)
    environment:                # 컨테이너 안에 주입할 환경변수 (DB 초기 설정)
      POSTGRES_DB: ledger       # 만들 데이터베이스 이름
      POSTGRES_USER: ledger     # 접속 계정
      POSTGRES_PASSWORD: ledger # 비밀번호 (지금은 학습용이라 단순하게)
    ports:
      - "5432:5432"             # 내 Mac의 5432 포트 ↔ 컨테이너 안 5432 포트 연결
    volumes:
      - db_data:/var/lib/postgresql/data  # DB 실제 데이터를 'db_data' 볼륨(안전금고)에 보존

  backend:
    build: ./backend            # 'image'와 달리 내 Dockerfile로 직접 굽는다 (내 코드가 들어가므로)
    container_name: ledger_backend
    environment:
      # DB 접속 주소. 호스트가 'localhost'가 아니라 'db' — 같은 도커 네트워크 안 컨테이너 이름.
      DATABASE_URL: postgresql+psycopg2://ledger:ledger@db:5432/ledger
    ports:
      - "8000:8000"             # localhost:8000 으로 API 접속
    depends_on:
      - db                      # db가 먼저 떠야 backend 기동
    volumes:
      - ./backend:/app          # 내 소스를 컨테이너에 연결 → 코드 고치면 즉시 반영(hot reload)

  frontend:
    build: ./frontend
    container_name: ledger_frontend
    ports:
      - "5173:5173"             # localhost:5173 으로 웹 화면 접속
    depends_on:
      - backend
    volumes:
      - ./frontend:/app         # 소스 연결 (hot reload)
      - /app/node_modules       # 익명 볼륨: 위 마운트가 컨테이너 안 node_modules를 덮어쓰는 것 방지

# 위에서 쓴 볼륨을 선언. 컨테이너를 지웠다 만들어도 이 안의 데이터는 살아남는다.
volumes:
  db_data:
